[project]
name = "brs-docs"
version = "0.7.0"
description = "MCP server for Roku BrightScript reference, samples, and rokudev-tools modules/templates."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "rokudev-tools" }]
dependencies = [
    "pydantic>=2.5",
    "mcp>=0.9",
    "pyyaml>=6.0",
    "tomli>=2.0;python_version<'3.11'",
]

[project.scripts]
brs-docs = "brs_docs.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brs_docs"]
# `packages` already covers all files under src/brs_docs/, including
# data/corpus.sqlite once generated by `make build-corpus` in T28.
# Once corpus.lock exists (T15), this section gets a force-include rule:
#   [tool.hatch.build.targets.wheel.force-include]
#   "corpus.lock" = "brs_docs/data/corpus.lock"

[tool.hatch.build.targets.sdist]
include = ["src/brs_docs", "tests", "pyproject.toml", "README.md", "corpus.lock"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "httpx>=0.27",
    "types-PyYAML>=6.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "RUF"]

[tool.mypy]
strict = true
python_version = "3.11"
packages = ["brs_docs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: integration tests (slower; spawn subprocesses or build real corpus)",
    "slow: slow tests (corpus build, network IO)",
]
